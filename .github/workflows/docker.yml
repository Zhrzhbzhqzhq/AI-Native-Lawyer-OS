name: Docker Build

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Frontend Image
        run: docker build -f apps/frontend/Dockerfile -t lawdesk/frontend:latest .

      - name: Build Backend Image
        run: docker build -f apps/backend/Dockerfile -t lawdesk/backend:latest .

      - name: Build AI Runtime Image
        run: docker build -f apps/ai-runtime/Dockerfile -t lawdesk/ai-runtime:latest .
