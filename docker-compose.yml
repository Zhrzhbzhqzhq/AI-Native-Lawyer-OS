version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: lawdesk-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-lawdesk}
      POSTGRES_USER: ${POSTGRES_USER:-lawdesk}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lawdesk}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lawdesk} -d ${POSTGRES_DB:-lawdesk}"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
